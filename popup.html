<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniqueTab Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>UniqueTab</h1>
        <p class="subtitle">タブの重複を防止</p>
      </header>

      <main>
        <div class="setting-item">
          <div class="setting-info">
            <h2>拡張機能を有効化</h2>
            <p class="description">ブックマークされたURLのタブ重複を防ぎます</p>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="enableToggle" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="divider"></div>

        <div class="statistics">
          <h3>統計情報</h3>
          <div class="stat-item">
            <span class="stat-label">統合されたタブ数:</span>
            <span class="stat-value" id="mergedTabsCount">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">最終統合時刻:</span>
            <span class="stat-value" id="lastMergeTime">-</span>
          </div>
          <button id="resetStatsBtn" class="reset-btn">統計をリセット</button>
        </div>
      </main>

      <footer>
        <p class="version">Version 1.0.0</p>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
